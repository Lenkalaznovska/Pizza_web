<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <div class="tree">
        <div class="star"></div>
        <div class="lights">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
    </div>
    <div class="gifts">
        <div class="gift" data-code="VANOCE5"></div>
        <div class="gift" data-code="VANOCE10"></div>
        <div class="gift" data-code="VANOCE15"></div>
    </div>
    <script>
        // Rozbalení dárků
        const gifts = document.querySelectorAll('.gift');

        gifts.forEach(gift => {
            gift.addEventListener('click', () => {
                const code = gift.getAttribute('data-code');
                gift.textContent = `Slevový kód: ${code}`;
                gift.style.backgroundColor = 'gold';
                gift.style.color = 'black';
                gift.style.pointerEvents = 'none'; // Zamezí opakovanému kliknutí
            });
        });
    </script>
</body>
</html>
