<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image">

    <div class="gifts">
        <!-- Generování dárků -->
        <div class="gift" data-code="VANOCE5"></div>
        <div class="gift" data-code="VANOCE10"></div>
        <div class="gift" data-code="VANOCE15"></div>
        <div class="gift" data-code="V tomto dárku není ukryta odměna."></div>
        <div class="gift" data-code="VANOCE5"></div>
        <div class="gift" data-code="VANOCE10"></div>
        <div class="gift" data-code="V tomto dárku není ukryta odměna."></div>
        <div class="gift" data-code="VANOCE15"></div>
        <div class="gift" data-code="V tomto dárku není ukryta odměna."></div>
        <div class="gift" data-code="VANOCE5"></div>
        <div class="gift" data-code="VANOCE10"></div>
        <div class="gift" data-code="V tomto dárku není ukryta odměna."></div>
    </div>

    <script>
        const today = new Date().toDateString();
        const userGiftOpenDate = localStorage.getItem('lastOpenedDate');

        if (userGiftOpenDate === today) {
            alert("Dnes už jste svůj dárek otevřeli. Přijďte zase zítra.");
            document.querySelectorAll('.gift').forEach(gift => gift.style.pointerEvents = 'none');
        } else {
            const gifts = document.querySelectorAll('.gift');
            gifts.forEach(gift => {
                gift.addEventListener('click', () => {
                    if (!localStorage.getItem('lastOpenedDate')) {
                        const code = gift.getAttribute('data-code');
                        gift.textContent = code;
                        gift.style.pointerEvents = 'none';
                        localStorage.setItem('lastOpenedDate', today); // Nastaví dnešní datum
                        gifts.forEach(g => g.style.pointerEvents = 'none'); // Zamezí dalším klikáním
                        alert("Přijďte zase zítra!");
                    }
                });
            });
        }
    </script>
</body>
</html>
