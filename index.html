<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <div id="tree-container">
        <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image" id="tree-image">
        <div id="tree-back" class="tree-back">
            <span id="tree-message"></span>
        </div>
    </div>
    <div id="notification" class="notification"></div>

    <script>
        // Generate discount code
        function generateDiscountMessage() {
            const random = Math.random();
            if (random < 0.1) {
                return 'Slevový kód: VANOCE15';
            } else if (random < 0.3) {
                return 'Slevový kód: VANOCE10';
            } else {
                return 'Slevový kód: VANOCE5';
            }
        }

        // Handle tree click
        document.getElementById('tree-image').addEventListener('click', function () {
            const treeImage = document.getElementById('tree-image');
            const treeMessage = document.getElementById('tree-message');
            const notification = document.getElementById('notification');

            // Add rotation animation
            treeImage.classList.add('rotate');

            // Display message after rotation
            setTimeout(() => {
                treeImage.style.transform = "rotateY(180deg)"; // Lock rotation
                const message = generateDiscountMessage();
                treeMessage.textContent = message || "Dnes to nevyšlo, přijďte zase zítra.";
                notification.textContent = message ? "Máte nový slevový kód!" : "";
                treeImage.classList.remove('rotate');
            }, 2000); // 2-second rotation duration
        });
    </script>
</body>
</html>
