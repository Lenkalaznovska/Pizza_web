<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <div id="tree-container">
        <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image" id="tree-image">
        <div id="tree-back" class="tree-back">Slevový kód: <span id="discount-code"></span></div>
    </div>
    <div id="notification" class="notification"></div>

    <script>
        // Funkce pro generování slevového kódu s pravděpodobností
        function generateDiscountCode() {
            const randomChance = Math.random(); // Náhodné číslo mezi 0 a 1

            // Nastavení pravděpodobnosti pro 15% slevu (např. 10% šance na 15% slevu)
            if (randomChance < 0.1) {
                return 'VANOCE15'; // 10% šance
            } else if (randomChance < 0.3) {
                return 'VANOCE10'; // 20% šance
            } else {
                return 'VANOCE5'; // 70% šance
            }
        }

        // Přidání události kliknutí na stromeček
        document.getElementById('tree-image').addEventListener('click', function() {
            // Otáčení obrázku
            const treeImage = document.getElementById('tree-image');
            treeImage.classList.add('rotate');
            setTimeout(function() {
                treeImage.classList.remove('rotate');
                const discountCode = generateDiscountCode(); // Vygenerování slevového kódu
                const treeBack = document.getElementById('tree-back');
                const notification = document.getElementById('notification');
                
                // Zobrazení slevového kódu nebo zprávy
                if (discountCode) {
                    document.getElementById('discount-code').textContent = discountCode;
                    notification.textContent = "Máte nový slevový kód!";
                } else {
                    notification.textContent = "Dnes pro vás žádný slevový kód není.";
                    treeBack.textContent = "Dnes tu není žádná odměna, přijďte zase zítra.";
                }
            }, 1000); // Doba otáčení 1 sekunda
        });
    </script>
</body>
</html>
