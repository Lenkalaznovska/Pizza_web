<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <div id="tree-container">
        <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image" id="tree-image">
        <div id="tree-back" class="tree-back">
            <span id="tree-message"></span>
        </div>
    </div>
    
    <script>
        // Snow animation
        document.body.onload = () => {
            const snowContainer = document.createElement('div');
            snowContainer.classList.add('snow');
            document.body.appendChild(snowContainer);

            for (let i = 0; i < 50; i++) {
                const flake = document.createElement('div');
                flake.className = 'flake';
                flake.style.left = Math.random() * 100 + '%';
                flake.style.animationDelay = Math.random() * 10 + 's';
                snowContainer.appendChild(flake);
            }
        };

        // Discount code generation with probabilities
        function generateDiscountMessage() {
            const random = Math.random();
            let message = "";

            // More likely to give 5% discount
            if (random < 0.6) {
                message = 'Slevový kód: VANOCE5 - Platnost do 31.12.2024';
            }
            // Less likely to give 10% discount
            else if (random < 0.85) {
                message = 'Slevový kód: VANOCE10 - Platnost do 31.12.2024';
            }
            // Least likely to give 15% discount
            else {
                message = 'Slevový kód: VANOCE15 - Platnost do 31.12.2024';
            }

            return message;
        }

        document.getElementById('tree-image').addEventListener('click', function () {
            const treeImage = document.getElementById('tree-image');
            treeImage.classList.add('rotate');
            
            setTimeout(() => {
                const message = generateDiscountMessage();
                const treeMessage = document.getElementById('tree-message');
                
                // Display the discount code
                treeMessage.textContent = message;

                // After showing the discount, show the "Dnes to nevyšlo" message
                setTimeout(() => {
                    treeMessage.textContent += " | Dnes to nevyšlo, přijďte zase zítra.";
                }, 1500); // Add the "try again" message after 1.5 seconds

                treeImage.classList.remove('rotate'); // Stops animation but keeps it rotated
                treeImage.style.transform = "rotateY(180deg)"; // Locks rotation
            }, 2000); // 2-second rotation delay
        });
    </script>
</body>
</html>
