<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <div id="tree-container">
        <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image" id="tree-image">
        <div id="tree-back" class="tree-back">
            <span id="tree-message">Kliknutím získáte překvapení!</span>
        </div>
    </div>
    <script>
        function generateDiscountMessage() {
            const random = Math.random();
            if (random < 0.1) {
                return 'Slevový kód: VANOCE15';
            } else if (random < 0.3) {
                return 'Slevový kód: VANOCE10';
            } else if (random < 0.6) {
                return 'Slevový kód: VANOCE5';
            } else {
                return "Dnes to nevyšlo, přijďte zase zítra!";
            }
        }

        const treeImage = document.getElementById('tree-image');
        const treeBack = document.getElementById('tree-back');
        const treeMessage = document.getElementById('tree-message');

        treeImage.addEventListener('click', function () {
            treeImage.classList.add('rotate');
            setTimeout(() => {
                const message = generateDiscountMessage();
                treeMessage.textContent = message;
                treeImage.style.display = 'none'; // Hides the image after rotation
                treeBack.style.visibility = 'visible'; // Displays the back
            }, 2000); // Wait 2 seconds for rotation
        });
    </script>
</body>
</html>
