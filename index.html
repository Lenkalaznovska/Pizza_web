<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <div id="tree-container">
        <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image" id="tree-image">
        <div id="tree-back" class="tree-back">
            <span id="tree-message"></span>
        </div>
    </div>

    <script>
        // Function to generate the discount code or message
        function generateMessage() {
            const random = Math.random();
            if (random < 0.1) {
                return 'VANOCE15'; // 15% discount
            } else if (random < 0.3) {
                return 'VANOCE10'; // 10% discount
            } else if (random < 0.6) {
                return 'VANOCE5';  // 5% discount
            } else {
                return 'Dnes to nevyšlo, přijďte zítra!'; // No discount today
            }
        }

        const treeImage = document.getElementById('tree-image');
        const treeBack = document.getElementById('tree-back');
        const treeMessage = document.getElementById('tree-message');

        // Event listener for image click
        treeImage.addEventListener('click', function () {
            treeImage.classList.add('rotate');
            setTimeout(() => {
                const message = generateMessage();
                treeMessage.textContent = message;
                treeImage.style.display = 'none'; // Hide the front image
                treeBack.style.visibility = 'visible'; // Show the back
            }, 2000); // Rotation duration: 2 seconds
        });
    </script>
</body>
</html>
