<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <div id="tree-container">
        <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image" id="tree-image">
        <div id="tree-back" class="tree-back"><span id="discount-code"></span></div>
    </div>

    <script>
        // Funkce pro generování slevového kódu s pravděpodobností
        function generateDiscountCode() {
            const randomChance = Math.random(); // Náhodné číslo mezi 0 a 1

            // Nastavení pravděpodobnosti pro 15% slevu (např. 10% šance na 15% slevu)
            if (randomChance < 0.1) {
                return 'VANOCE15'; // 10% šance
            } else if (randomChance < 0.3) {
                return 'VANOCE10'; // 20% šance
            } else {
                return null; // 70% šance, žádný slevový kód
            }
        }

        // Přidání události kliknutí na stromeček
        document.getElementById('tree-image').addEventListener('click', function() {
            // Otáčení obrázku
            const treeImage = document.getElementById('tree-image');
            treeImage.classList.add('rotate');
            setTimeout(function() {
                const discountCode = generateDiscountCode(); // Vygenerování slevového kódu
                
                // Zobrazení slevového kódu nebo alternativní zprávy
                const treeBack = document.getElementById('tree-back');
                const discountText = document.getElementById('discount-code');
                if (discountCode) {
                    discountText.textContent = discountCode; // Zobrazení slevového kódu
                } else {
                    discountText.textContent = "Dnes to nevyšlo. Přijďte zase zítra."; // Alternativní zpráva
                }
            }, 2000); // Zpoždění pro zajištění otáčení obrázku, 2 sekundy
        });
    </script>
</body>
</html>
