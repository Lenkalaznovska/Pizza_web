<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>
    <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image" id="tree-image">
    <div id="notification" class="notification"></div>

    <script>
        // Funkce pro generování slevového kódu
        function generateDiscountCode() {
            const codes = ['VANOCE5', 'VANOCE10', 'VANOCE15'];
            const randomCode = codes[Math.floor(Math.random() * codes.length)];
            return randomCode;
        }

        // Funkce pro generování zprávy v případě, že kód není vygenerován
        function generateNoCodeMessage() {
            const messages = [
                "Dnes to nevyslo, zkuste to zítra.",
                "Bohužel, dnes žádný slevový kód není.",
                "Zkuste štěstí zítra, dnes to nevyšlo.",
                "Dnes vám kód nepadl, zítra to může být jinak!"
            ];
            return messages[Math.floor(Math.random() * messages.length)];
        }

        // Přidání události kliknutí na stromeček
        document.getElementById('tree-image').addEventListener('click', function() {
            const discountCode = generateDiscountCode(); // Vygenerování slevového kódu
            const notification = document.getElementById('notification');
            
            if (discountCode) {
                notification.textContent = `Váš slevový kód je: ${discountCode}. Platný do 31.12.2024.`;
            } else {
                notification.textContent = generateNoCodeMessage();
            }
        });
    </script>
</body>
</html>
