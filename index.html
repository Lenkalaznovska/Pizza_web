<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuální vánoční stromeček</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Virtuální vánoční stromeček</h1>

    <!-- Obal pro stromeček s možností otočení -->
    <div class="tree-container" id="tree-container">
        <div class="tree" id="tree">
            <img src="images/VANOCE.jpg" alt="Vánoční stromeček" class="tree-image">
            <div class="tree-back">
                <p id="tree-message">Dnes žádná odměna. Přijďte zase zítra!</p>
            </div>
        </div>
    </div>

    <!-- Notifikace pro zobrazení zprávy -->
    <div id="notification" class="notification"></div>

    <script>
        // Funkce pro generování kódu podle pravděpodobnosti
        function generateCode() {
            const random = Math.random();
            if (random < 0.05) {
                return "VANOCE5";  // 5% šance na kód VANOCE5
            } else if (random < 0.15) {
                return "VANOCE10";  // 10% šance na kód VANOCE10
            } else if (random < 0.30) {
                return "VANOCE15";  // 15% šance na kód VANOCE15
            } else {
                return "Nic";  // 70% šance na nic
            }
        }

        // Přidání události kliknutí na stromeček
        document.getElementById('tree-container').addEventListener('click', function() {
            const tree = document.getElementById('tree');
            const treeMessage = document.getElementById('tree-message');
            const notification = document.getElementById('notification');
            
            // Otočení stromečku
            tree.style.transform = 'rotateY(180deg)';  // Otočení o 180 stupňů

            // Generování kódu
            const code = generateCode();
            treeMessage.textContent = code;

            // Zobrazení zprávy v notifikaci
            notification.textContent = code;
            notification.style.display = 'block';  // Zobrazení pruhu s informací

            // Pro testování otočení vícekrát (Pokud chcete)
            setTimeout(() => {
                tree.style.transform = 'rotateY(0deg)'; // Zpět na původní pozici
                setTimeout(() => {
                    tree.style.transform = 'rotateY(180deg)';
                    treeMessage.textContent = generateCode(); // Opět generování nového kódu
                }, 1000);
            }, 2000); // Otočení po 2 sekundách a opět po 1 sekundě zpět
        });
    </script>

    <!-- Sněžení -->
    <div class="snow"></div>

</body>
</html>
